<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MMXchange Hub</title>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
  Pi.init({ version: "2.0" });

  async function loginWithPi() {
    try {

      const scopes = ['payments', 'username'];

      const user = await Pi.authenticate(
        scopes,
        onIncompletePaymentFound
      );

      alert("Logged in as " + user.username);

    } catch (err) {
      console.error(err);
    }
  }

  function onIncompletePaymentFound(payment) {
    console.log(payment);
  }
</script>

<style>
body{
font-family:Arial;
text-align:center;
padding:20px;
background:#f2f2f2;
}

button{
padding:10px 20px;
font-size:16px;
border-radius:8px;
}
</style>

</head>

<body>

<h1>MMXchange Hub</h1>

<p>Buy and sell services with Pi Network</p>

<button onclick="loginWithPi()">
Login with Pi
</button>

</body>
</html>
